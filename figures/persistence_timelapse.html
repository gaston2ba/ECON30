<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Persistence Timelapse</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="../js/map-utils.js"></script>
  <style>
    :root { --paper:#f8f5ed; --ink:#2a2218; --muted:#6b5d48; --rule:#c9bda2; }
    body { margin:0; padding:1.25rem; font-family: Georgia, "Times New Roman", serif; color:var(--ink); background:var(--paper); text-align:center; }
    h2 { margin:0 0 .35rem; font-size:1.2rem; }
    .intro { margin:0 auto .9rem; max-width:52ch; line-height:1.45; color:#4a3f30; font-size:.95rem; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; max-width:920px; margin:0 auto; }
    .card { border:1px solid var(--rule); background:#fbf8f1; padding:.5rem; }
    .card h3 { margin:0 0 .35rem; font-size:.95rem; font-weight:600; }
    .plot { width:100%; height:auto; display:block; margin:0 auto; }
    .controls { max-width:920px; margin:.85rem auto 0; border:1px solid var(--rule); padding:.65rem .8rem; background:#fbf8f1; text-align:left; }
    .year-row { display:flex; gap:.7rem; align-items:center; }
    input[type=range] { width:100%; accent-color:#2a2218; }
    .counter { margin-top:.4rem; font-size:.93rem; color:#3f3528; }
    .legend { margin-top:.35rem; font-size:.8rem; color:var(--muted); text-align:center; }
    @media (max-width: 800px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <h2>Drag the slider. Watch what doesn't change.</h2>
  <p class="intro">Each map uses real administrative boundaries and ranks neighborhoods by household crowding (darker = more crowded).</p>
  <div id="loading">Loading persistence maps…</div>
  <div class="grid" id="grid" style="display:none;">
    <div class="card">
      <h3 id="title-mexico">Mexico City</h3>
      <svg id="map-mexico" class="plot" aria-label="Mexico City persistence map"></svg>
    </div>
    <div class="card">
      <h3 id="title-paris">Paris</h3>
      <svg id="map-paris" class="plot" aria-label="Paris persistence map"></svg>
    </div>
  </div>
  <div class="controls" id="controls" style="display:none;">
    <div class="year-row">
      <strong>Year</strong>
      <input id="year-slider" type="range" min="0" max="0" step="1" value="0" />
      <strong id="year-label">—</strong>
    </div>
    <div class="legend">less crowded → more crowded</div>
    <div class="counter" id="counter"></div>
  </div>

  <script>
  async function main() {
    const [payload, gMex, gPar] = await Promise.all([
      fetch('../data/analysis/persistence_interactives.json').then(r => r.json()),
      fetch('../data/maps/mexico_alcaldias.geojson').then(r => r.json()),
      fetch('../data/maps/paris_arrondissements.geojson').then(r => r.json()),
    ]);

    const years = payload.mexico.years;
    const latestMex = payload.mexico.latest_year;
    const latestPar = payload.paris.latest_year;
    const w = Math.min(440, Math.max(280, (document.body.clientWidth - 80) / 2));
    const hMex = Math.round(w * 0.72);
    const hPar = Math.round(w * 0.82);

    const slider = document.getElementById('year-slider');
    slider.max = years.length - 1;
    slider.value = years.length - 1;

    function nearestParisYear(y) {
      const ys = payload.paris.years;
      let best = ys[0], bestd = Math.abs(ys[0] - y);
      for (const t of ys) {
        const d = Math.abs(t - y);
        if (d < bestd) { best = t; bestd = d; }
      }
      return best;
    }

    function render(year) {
      const yPar = nearestParisYear(year);
      const mexPoints = payload.mexico.data_by_year[String(year)];
      const parPoints = payload.paris.data_by_year[String(yPar)];
      document.getElementById('title-mexico').textContent = `Mexico City — crowding rank, ${year}`;
      document.getElementById('title-paris').textContent = `Paris — crowding rank, ${yPar}`;
      CityMapUtils.renderChoropleth({
        svg: '#map-mexico', geojson: gMex, width: w, height: hMex,
        getFill: (d) => {
          const p = mexPoints.find(x => x.id === Number(d.properties.id));
          return p ? CityMapUtils.colorForRank(p.rank, 16) : '#cbbfa2';
        },
        labels: true,
        labelText: (d) => String(d.properties.id),
      });
      CityMapUtils.renderChoropleth({
        svg: '#map-paris', geojson: gPar, width: w, height: hPar,
        getFill: (d) => {
          const p = parPoints.find(x => x.id === Number(d.properties.id));
          return p ? CityMapUtils.colorForRank(p.rank, 20) : '#cbbfa2';
        },
        labels: true,
        labelText: (d) => String(d.properties.id),
      });

      document.getElementById('year-label').textContent = String(year);
      const cMex = payload.mexico.shift_counter_vs_latest[String(year)];
      const cPar = payload.paris.shift_counter_vs_latest[String(yPar)];
      document.getElementById('counter').innerHTML =
        `Compared to <strong>${year}</strong>, <strong>${cMex.changed_gt5} of ${cMex.n_total}</strong> alcaldías changed rank by more than 5 positions by ${latestMex}. ` +
        `For Paris (closest year ${yPar}), <strong>${cPar.changed_gt5} of ${cPar.n_total}</strong> arrondissements changed by more than 5 by ${latestPar}.`;
    }

    slider.addEventListener('input', e => render(years[Number(e.target.value)]));
    render(years[years.length - 1]);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('controls').style.display = 'block';
  }

  main().catch(err => {
    document.getElementById('loading').textContent = 'Failed to load persistence maps.';
    console.error(err);
  });
  </script>
</body>
</html>
